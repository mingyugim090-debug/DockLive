product:
  name: Dock Live
  purpose: >
    Analyze public notices and official forms, especially IRIS/government R&D
    calls, collect only missing company, university, researcher, or research-lab
    project inputs, draft submission documents section by section, and export
    editable HTML/HWPX.
  priority:
    - grounded_document_ingestion
    - fact_based_analysis
    - applicant_project_input_collection
    - government_rnd_submission_drafting
    - missing_input_collection
    - section_drafting
    - user_confirmation
    - validated_export

agent_collaboration:
  codex:
    role: implementation_verification_driver
    responsibilities:
      - inspect_existing_context_before_changes
      - read_project_memory_and_role_file
      - implement_scoped_changes
      - run_harness_quality_gates
      - record_or_resolve_repeat_failures
      - generate_handoff_for_claude_when_delegating
  claude_code:
    role: broad_implementation_collaborator
    responsibilities:
      - start_from_codex_handoff
      - follow_context_layer
      - keep_changes_inside_existing_boundaries
      - leave_verifiable_outputs_for_codex
      - report_commands_failures_and_assumptions
  qa_agent:
    role: test_first_guardrail_author
    responsibilities:
      - turn_feature_specs_into_tests
      - mock_external_services
      - cover_happy_edge_and_error_paths

operating_philosophy:
  borrowed_from_hermes:
    - explicit_context_loading_before_tool_use
    - bounded_project_memory
    - searchable_error_and_run_history
    - role_specific_tool_boundaries
    - delegated_subtasks_with_return_contracts
    - untrusted_agent_output_until_verified
  not_adopted:
    - product_runtime_dependency_on_hermes_agent
    - broad_autonomous_tool_access_inside_user_workflows

memory_layer:
  durable_project_memory:
    - harness/memory/PROJECT_MEMORY.md
    - harness/memory/USER_WORKFLOW.md
  recurring_error_memory: harness/errors/registry.json
  disposable_run_logs: harness/runs
  search_command: python tools/harness/error_memory.py search "<query>"

handoff_protocol:
  codex_to_claude:
    generator: tools/harness/create_handoff.py
    command: python tools/harness/create_handoff.py --task "<task>"
    claude_must_read:
      - AGENTS.md
      - harness/state-spec.yaml
      - harness/memory/PROJECT_MEMORY.md
      - harness/memory/USER_WORKFLOW.md
      - harness/roles/claude-code.md
    claude_return_contract:
      - changed_files
      - behavior_summary
      - commands_run
      - failures_or_open_questions
      - suggested_codex_verification_gate

contracts:
  analysis_result:
    must_include:
      - doc_type
      - applicant_kind
      - title
      - organization
      - summary
      - timeline
      - checklist
      - document_sections
      - eligibility
      - submission_method
      - evaluation_criteria
      - benefits
      - support_programs
      - cautions
      - uncertain_fields
      - evidence_quotes
      - source_evidence
    forbidden:
      - invented_deadlines
      - invented_organizations
      - invented_required_documents
      - inferred_support_amounts_without_source
      - invented_government_rnd_support_limits_or_ratios
      - invented_company_project_facts
      - invented_research_lab_project_facts
  draft:
    must:
      - use_analysis_output_and_user_inputs_only
      - draft_by_section
      - keep_government_rnd_submission_documents_table_first_for_v1
      - preserve_confirmation_required
      - avoid_final_submission_claims_before_confirmation
  export:
    must:
      - preserve_user_work_when_hwpx_fails
      - provide_html_fallback
      - include_validation_summary_when_available

api_boundaries:
  backend:
    framework: FastAPI
    owns:
      - parsing
      - ai_provider_calls
      - analysis_normalization
      - workflow_state
      - export_generation
  frontend:
    framework: Next.js 14
    owns:
      - upload_flow
      - analysis_review
      - user_input_collection
      - draft_review
      - export_ui
  tools:
    owns:
      - local_developer_automation
      - optional_hwp_mcp
      - harness_runner
      - memory_search
      - handoff_generation

hwpx_rules:
  package_type: zip_xml
  hwp_input: convert_or_parse_before_analysis
  official_forms: prefer_clone_and_replace
  validation:
    - fix_namespaces
    - validate_package
    - extract_text_for_expected_content

non_goals:
  - community_feed
  - team_recruiting
  - social_profiles
  - speculative_notice_completion
  - iris_live_crawling_or_login_automation_for_harness_v1
  - native_hwpx_chart_objects_for_v1
