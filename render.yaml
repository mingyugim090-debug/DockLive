services:
  - type: web
    name: livedock-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MAX_PDF_SIZE_MB
        value: "20"
      - key: MOCK_MODE
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: "livedock-documents"
      - key: SUPABASE_TIMEOUT_SECONDS
        value: "10"
      - key: WORKFLOW_TTL_SECONDS
        value: "604800"
      - key: HWPX_EXPORT_ENABLED
        value: "true"
      - key: HWPX_SKILL_DIR
        value: "/app/hwpx_toolchain"
